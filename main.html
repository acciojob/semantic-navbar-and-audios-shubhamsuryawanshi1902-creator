<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navigation and Audio Section</title>
</head>
<body>

    <!-- Part 1: Navbar -->
    <!-- Requirements: 'nav' element, unordered list, 'li' elements, exactly three links, valid href -->
    <nav>
        <ul>
            <li><a href="https://example.com/link1">Link 1</a></li>
            <li><a href="https://example.com/link2">Link 2</a></li>
            <li><a href="https://example.com/link3">Link 3</a></li>
        </ul>
    </nav>

    <!-- Part 2: Audio Section -->
    <!-- Requirements: Heading "3 random audios", 3 tracks with provided URLs and controls -->
    <section>
        <h2>3 random audios</h2>
        
        <div>
            <audio controls>
                <source src="http://commondatastorage.googleapis.com/codeskulptor-demos/DDR_assets/Kangaroo_MusiQue_-_The_Neverwritten_Role_Playing_Game.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div>
            <audio controls>
                <source src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg" type="audio/ogg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div>
            <audio controls>
                <source src="http://codeskulptor-demos.commondatastorage.googleapis.com/pang/paza-moduless.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </section>

</body>
</html>
